###############################################################################
# Cloud Build — dev environment
# Trigger: push to `dev` branch
#
# Substitutions (set in Cloud Build trigger config):
#   _REGION         e.g. us-central1
#   _AR_REPO        Artifact Registry repo name  e.g. gcp-universal-backend
#   _SERVICE        Cloud Run service name        e.g. gcp-universal-backend-dev
#   _DB_SECRET      Secret Manager name for DATABASE_URL
#   _APP_DB_SECRET  Secret Manager name for APP_DB_CONNECTIONS
#   _GOOGLE_CLIENT_ID_SECRET  Secret Manager name for GOOGLE_CLIENT_ID
#   _JWT_PRIV_SECRET   Secret Manager name for JWT_PRIVATE_KEY_B64
#   _JWT_PUB_SECRET    Secret Manager name for JWT_PUBLIC_KEY_B64
#   _JWT_ISSUER        JWT issuer claim (this service's public URL)
#   _JWT_AUDIENCE      JWT audience claim (must match downstream GUB_AUDIENCE)
###############################################################################

substitutions:
  _REGION: us-central1
  _AR_REPO: gcp-universal-backend
  _SERVICE: gcp-universal-backend-dev
  _DB_SECRET: dev-database-url
  _APP_DB_SECRET: dev-app-db-connections
  _GOOGLE_CLIENT_ID_SECRET: dev-google-client-id
  # GUB's own Google client_id is loaded from this secret. It's auto-
  # seeded onto a "GUB itself" trusted_apps row at boot — no static
  # _GOOGLE_ALLOWED_AUDIENCES substitution needed any more.
  _JWT_PRIV_SECRET: dev-jwt-private-key-b64
  _JWT_PUB_SECRET: dev-jwt-public-key-b64
  _CLOUDSQL_INSTANCE: gub-platform
  _JWT_ISSUER: https://gcp-universal-backend-dev-843516467880.us-central1.run.app
  _JWT_AUDIENCE: https://gcp-universal-backend-dev-843516467880.us-central1.run.app
  # Sibling service URLs used by outbound features (magic-link emails etc.)
  _GUB_ADMIN_BASE_URL: https://gub-admin-dev-843516467880.us-central1.run.app
  _GUB_REVIEW_BASE_URL: https://gub-review-dev-843516467880.us-central1.run.app
  # GOOGLE_ALLOWED_AUDIENCES + CORS_ALLOWED_ORIGINS are no longer set
  # here. Both allow-lists merged into the trusted_apps DB table
  # (migration 20260430040000_trusted_apps_registry), one row per
  # consuming app, manageable at runtime via gub-admin → Settings →
  # Trusted apps. New origins / new Google client_ids get added via the
  # admin UI; the change is live within the next request — no redeploy.
  #
  # The env GOOGLE_CLIENT_ID (loaded from Secret Manager below) is
  # auto-seeded onto a "GUB itself" trusted_apps row at every server
  # boot (ensureSelfTrustedApp) so the OAuth broker keeps working.
  #
  # See README "Trusted apps registry — dev/staging tooling" for the
  # layer split (this DB-backed system vs the prod edge CORS + upstream
  # OAuth client registration that will land alongside the prod env).
  # Google Workspace Directory sync — impersonation target + SA key secret.
  # The SA key (JSON) is base64-encoded and stored in Secret Manager; GUB
  # decodes it at boot. Impersonation uses domain-wide delegation.
  _GOOGLE_DIRECTORY_IMPERSONATE_EMAIL: support@anomaly.com
  _GOOGLE_DIRECTORY_SA_SECRET: dev-google-directory-sa-key-b64
  # Google Drive sync. Path A (legacy / fallback): the Drive client falls
  # back to the Directory SA's key when GOOGLE_DRIVE_TARGET_SA is unset,
  # impersonating the bot user below via DWD. Workspace admin authorizes
  # https://www.googleapis.com/auth/drive.readonly on the dedicated Drive
  # SA's DWD client_id and shares the Drive root folder with the bot
  # below (reader access).
  #
  # Path B (preferred prod posture): set _GOOGLE_DRIVE_TARGET_SA to a
  # dedicated Drive SA's email; runtime SA must hold roles/iam.service
  # AccountTokenCreator on it. DWD scope drive.readonly authorizes only
  # the dedicated SA, never the runtime. Auto-switches in drive.client.ts.
  _GOOGLE_DRIVE_IMPERSONATE_EMAIL: bot.clientdrives@anomaly.com
  # Top-level shared-drive folder housing all account folders. Required for
  # full-sync / new-account discovery; per-entity scans work without it.
  # Empty until handed back from IT — Cloud Run accepts empty env values.
  _DRIVE_ROOT_FOLDER_ID: ""
  # Gemini API key for the staff classifier + Drive extraction prompts.
  # Without this, GeminiLlmDriver falls back to MockLlmDriver which returns
  # empty responses → every batch greedy-keeps, defeating the classifier.
  _GEMINI_SECRET: dev-gemini-api-key

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

steps:
  # ── 1. Type check ────────────────────────────────────────────────────────
  - id: typecheck
    name: node:20-alpine
    entrypoint: sh
    args:
      - -c
      - npm ci && npx tsc --noEmit

  # ── 2. Build Docker image ─────────────────────────────────────────────────
  - id: build
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$SHORT_SHA
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:latest
      - .
    waitFor: [typecheck]

  # ── 3. Push image ─────────────────────────────────────────────────────────
  - id: push
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - $_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE
    waitFor: [build]

  # ── 4. Deploy migration job with new image ────────────────────────────────
  - id: deploy-migration-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - $_SERVICE-migrate
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --command=npx
      - --args=prisma,migrate,deploy
      - --set-secrets=DATABASE_URL=$_DB_SECRET:latest
      - --service-account=sa-$_SERVICE@$PROJECT_ID.iam.gserviceaccount.com
      - --set-cloudsql-instances=$PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE
    waitFor: [push]

  # ── 5. Run migrations ─────────────────────────────────────────────────────
  - id: migrate
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - execute
      - $_SERVICE-migrate
      - --region=$_REGION
      - --wait
    waitFor: [deploy-migration-job]

  # ── 6. Deploy cleanup job with new image ─────────────────────────────────
  # Updates the job definition so Cloud Scheduler always runs the latest image.
  # Cloud Scheduler owns the execution schedule — this step does NOT run it.
  - id: deploy-cleanup-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - $_SERVICE-cleanup
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --command=node
      - --args=-r,dotenv/config,dist/scripts/cleanup.js
      - --set-secrets=DATABASE_URL=$_DB_SECRET:latest
      - --service-account=sa-$_SERVICE@$PROJECT_ID.iam.gserviceaccount.com
      - --set-cloudsql-instances=$PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE
      - --max-retries=2
      - --task-timeout=300s
    waitFor: [migrate]

  # ── 7. Deploy to Cloud Run ────────────────────────────────────────────────
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_AR_REPO/$_SERVICE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=2
      # CPU always allocated — directory/drive syncs run as fire-and-forget
      # background work AFTER the HTTP response. Default Cloud Run throttles
      # CPU to near-zero once the response is sent, which killed mid-flight
      # syncs (see sync_runs rows stuck in 'running' pre-2026-04-22).
      - --no-cpu-throttling
      - --memory=512Mi
      - --cpu=1
      - --port=3000
      - --service-account=sa-$_SERVICE@$PROJECT_ID.iam.gserviceaccount.com
      # ^||^ tells gcloud to split KVs on ||, so commas inside values (like
      # CORS_ALLOWED_ORIGINS) aren't misparsed.
      # SELF_BASE_URL = JWT_ISSUER for now (both are this service's public
      # Cloud Run URL). The Drive runner self-POSTs to this URL when a
      # chunked sync needs continuation. See README "Drive sync — Chunking".
      - --set-env-vars=^||^NODE_ENV=development||GCP_PROJECT_ID=$PROJECT_ID||JWT_ISSUER=$_JWT_ISSUER||JWT_AUDIENCE=$_JWT_AUDIENCE||SELF_BASE_URL=$_JWT_ISSUER||GUB_ADMIN_BASE_URL=$_GUB_ADMIN_BASE_URL||GUB_REVIEW_BASE_URL=$_GUB_REVIEW_BASE_URL||GOOGLE_DIRECTORY_IMPERSONATE_EMAIL=$_GOOGLE_DIRECTORY_IMPERSONATE_EMAIL||GOOGLE_DRIVE_IMPERSONATE_EMAIL=$_GOOGLE_DRIVE_IMPERSONATE_EMAIL||DRIVE_ROOT_FOLDER_ID=$_DRIVE_ROOT_FOLDER_ID
      - --set-secrets=DATABASE_URL=$_DB_SECRET:latest,APP_DB_CONNECTIONS=$_APP_DB_SECRET:latest,GOOGLE_CLIENT_ID=$_GOOGLE_CLIENT_ID_SECRET:latest,JWT_PRIVATE_KEY_B64=$_JWT_PRIV_SECRET:latest,JWT_PUBLIC_KEY_B64=$_JWT_PUB_SECRET:latest,GOOGLE_DIRECTORY_SA_KEY_B64=$_GOOGLE_DIRECTORY_SA_SECRET:latest,GEMINI_API_KEY=$_GEMINI_SECRET:latest
      - --set-cloudsql-instances=$PROJECT_ID:$_REGION:$_CLOUDSQL_INSTANCE
    waitFor: [migrate]
